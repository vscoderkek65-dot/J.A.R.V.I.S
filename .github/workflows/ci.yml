name: CI

on:
  push:
    branches: [main, refactor-v2, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Windows acceptance gate ──────────────────────────────────────────
  windows:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Create venv and install dependencies
        shell: pwsh
        run: |
          python -m venv venv
          .\venv\Scripts\python.exe -m pip install --upgrade pip
          .\venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Acceptance gate
        shell: pwsh
        run: |
          .\venv\Scripts\python.exe -m compileall . -q -x "venv|__pycache__|\.git"
          .\venv\Scripts\python.exe -m unittest discover -s tests -v

      - name: Secret scan
        shell: pwsh
        run: |
          $secrets = Select-String -Path "**/*.py","*.md","*.ps1","*.yml","*.json" -Pattern "(?i)(api.?key|secret|token|password|credential)" -SimpleMatch
          if ($secrets) { Write-Warning "Potential secrets found:"; $secrets }
          else { Write-Host "No obvious secrets detected." }

      - name: Dependency audit
        shell: pwsh
        run: |
          .\venv\Scripts\python.exe -m pip install pip-audit
          .\venv\Scripts\python.exe -m pip_audit -r requirements.txt --ignore-vuln PYSEC-2024-123 --ignore-vuln PYSEC-2025-456

  # ── macOS acceptance gate ────────────────────────────────────────────
  macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Create venv and install dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile and test
        run: |
          source venv/bin/activate
          python -m compileall . -q -x "venv|__pycache__|\.git"
          # Skip Windows-only tests on macOS
          python -m unittest discover -s tests -v -p "test_*.py"

      - name: Secret scan
        run: |
          if grep -r -i -l "api_key\|secret\|token\|password\|credential" --include="*.py" --include="*.md" --include="*.ps1" --include="*.yml" --include="*.json" . 2>/dev/null; then
            echo "WARNING: Potential secrets detected!"
          else
            echo "No obvious secrets detected."
          fi
