name: CI

on:
  push:
    branches: [main, refactor-v2, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Windows acceptance gate ──────────────────────────────────────────
  windows:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Create venv and install dependencies
        shell: pwsh
        run: |
          python -m venv venv
          .\venv\Scripts\python.exe -m pip install --upgrade pip
          .\venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Acceptance gate
        shell: pwsh
        run: |
          .\venv\Scripts\python.exe -m compileall . -q -x "venv|__pycache__|\.git"
          .\venv\Scripts\python.exe -m unittest discover -s tests -v

      - name: Secret scan
        shell: pwsh
        run: .\venv\Scripts\python.exe scripts\secret_scan.py

      - name: Dependency audit
        shell: pwsh
        run: |
          .\venv\Scripts\python.exe -m pip install pip-audit
          .\venv\Scripts\python.exe -m pip_audit -r requirements.txt --ignore-vuln PYSEC-2024-123 --ignore-vuln PYSEC-2025-456

      - name: Static security scan
        shell: pwsh
        run: |
          .\venv\Scripts\python.exe -m pip install "bandit[toml]"
          .\venv\Scripts\python.exe -m bandit -r actions core memory dashboard.py main.py -c pyproject.toml --severity-level medium

  # ── macOS portability gate ───────────────────────────────────────────
  macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Create venv
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip

      - name: Compile
        run: |
          source venv/bin/activate
          python -m compileall . -q -x "venv|__pycache__|\.git"

      - name: Secret scan
        run: |
          source venv/bin/activate
          python scripts/secret_scan.py
